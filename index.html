<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Device Diagnostics</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-purple: #a855f7;
            --border-color: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .timestamp {
            font-size: 13px;
            color: var(--text-muted);
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .value {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 16px;
            font-weight: 600;
            word-break: break-all;
        }

        .identity-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .battery-container {
            margin-top: 15px;
        }

        .progress-bar-bg {
            background-color: var(--border-color);
            height: 10px;
            width: 100%;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: var(--accent-green);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-in-out;
        }

        .site-list {
            list-style-type: none;
            padding: 0;
            margin: 8px 0 0 0;
        }

        .site-item {
            font-size: 14px;
            padding: 10px 12px;
            background-color: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--accent-purple);
            margin-bottom: 8px;
            border-radius: 0 6px 6px 0;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>System Diagnostics Console</h1>
            <div class="timestamp">Last Hardware Scan: <span id="time-stamp">Loading...</span></div>
        </header>

        <!-- System Identity Profile Component -->
        <div class="card">
            <div class="identity-grid">
                <div>
                    <div class="label">PC Name / Host</div>
                    <div class="value" id="pc-name" style="color: var(--accent-blue);">Fetching...</div>
                </div>
                <div>
                    <div class="label">Current User</div>
                    <div class="value" id="user-name" style="color: var(--accent-blue);">Fetching...</div>
                </div>
            </div>
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 15px 0;">
            <div class="label">Hardware UUID</div>
            <div class="value" id="machine-id" style="font-size: 14px; color: var(--text-muted);">Fetching ID...</div>
        </div>

        <!-- Battery Metrics Output -->
        <div class="card">
            <div class="label">Power & Battery Profile</div>
            <div class="value">
                <span id="battery-level">--</span> 
                <span id="battery-status" style="font-size: 14px; color: var(--text-muted); font-weight: normal; margin-left: 10px;">(--)</span>
            </div>
            
            <div class="battery-container" id="battery-track" style="display: none;">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="battery-fill"></div>
                </div>
            </div>
        </div>

        <!-- Microsoft Edge Workspace Monitor -->
        <div class="card">
            <div class="label" style="color: var(--accent-purple);">Active Microsoft Edge Sites (Tabs)</div>
            <ul class="site-list" id="edge-sites-list">
                <!-- Dynamically Hydrated -->
            </ul>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof systemData !== 'undefined') {
                // Populate Identity & Metadata
                document.getElementById('pc-name').textContent = systemData.pcName;
                document.getElementById('user-name').textContent = systemData.userName;
                document.getElementById('machine-id').textContent = systemData.uuid;
                document.getElementById('time-stamp').textContent = systemData.lastUpdated;

                // Process Battery Metrics
                const levelStr = String(systemData.batteryLevel || '').trim();
                const statusStr = String(systemData.batteryStatus || '').trim();

                if (levelStr === "N/A" || !levelStr) {
                    document.getElementById('battery-level').textContent = "AC Power Source Only";
                    document.getElementById('battery-status').textContent = `(${statusStr})`;
                } else {
                    document.getElementById('battery-level').textContent = levelStr + "%";
                    document.getElementById('battery-status').textContent = `| System State: ${statusStr}`;

                    const fillElement = document.getElementById('battery-fill');
                    document.getElementById('battery-track').style.display = 'block';
                    fillElement.style.width = levelStr + "%";

                    const levelNum = parseInt(levelStr, 10);
                    if (levelNum <= 20) {
                        fillElement.style.backgroundColor = '#ef4444';
                    } else if (statusStr.toLowerCase().includes('charging')) {
                        fillElement.style.backgroundColor = '#3b82f6';
                    }
                }

                // Hydrate Edge Active Sites Workspace List
                const listContainer = document.getElementById('edge-sites-list');
                if (Array.isArray(systemData.edgeSites)) {
                    systemData.edgeSites.forEach(siteTitle => {
                        const li = document.createElement('li');
                        li.className = 'site-item';
                        li.textContent = siteTitle;
                        li.title = siteTitle; 
                        listContainer.appendChild(li);
                    });
                } else {
                    const li = document.createElement('li');
                    li.className = 'site-item';
                    li.style.borderLeftColor = '#ef4444';
                    li.textContent = systemData.edgeSites || "No active site data found.";
                    listContainer.appendChild(li);
                }

            } else {
                document.getElementById('machine-id').textContent = "Configuration error. Please run the .bat launcher.";
            }
        });
    </script>
</body>
</html>
